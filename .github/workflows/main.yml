name: Metrics
on:
  # Schedule daily updates
  schedule: [{cron: "0 0 * * *"}]
  # (optional) Run workflow manually
  workflow_dispatch:
  # (optional) Run workflow when pushing on master/main
  push: {branches: ["master", "main"]}

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    environment: 
      name: production
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          
          # Your existing core features (updated to standard syntax)
          plugin_isocalendar: yes
          plugin_achievements: yes
          plugin_activity: yes

          # ----------------------------------------
          # Newly Added Plugins
          # ----------------------------------------

          # 1. Languages
          plugin_languages: yes
          plugin_languages_ignored: ""           # Optional: e.g., "html, css" to ignore them
          plugin_languages_details: percentage   # Options: bytes-size, percentage, lines
          plugin_languages_limit: 8              # Display up to 8 languages
          
          # 2. Stargazers
          plugin_stargazers: yes
          plugin_stargazers_charts: yes          # Adds charts for your stargazers
          plugin_stargazers_worldmap: yes        # Worldmap of where your stars come from
          
          # 3. Topics
          plugin_topics: yes
          plugin_topics_sort: stars              # Sort topics by stars
          plugin_topics_mode: mastered           # Modes: mastered, starred, icons
          plugin_topics_limit: 15
          
          # 4. Licenses
          plugin_licenses: yes
          plugin_licenses_setup: npm, yarn, pip  # Tools to check for dependencies/licenses
          plugin_licenses_legal: yes             # Display legal info/licenses

          # 5. Habits
          plugin_habits: yes
          plugin_habits_from: 200       # Compute habits from the last 200 events
          plugin_habits_days: 14        # Show history over the last 14 days
          plugin_habits_facts: yes      # Display interesting facts based on habits
          plugin_habits_charts: yes     # Display time/habit charts

          # 6. Traffic
          plugin_traffic: yes
